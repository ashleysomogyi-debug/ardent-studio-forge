  <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","@id":"https://ardentstudio.io/#faq","mainEntity":[{"@type":"Question","name":"What is Ardent Studio?","acceptedAnswer":{"@type":"Answer","text":"Ardent Studio is an AI consultancy and training studio based in Palm Beach County, Florida. We build custom AI automation tools for small businesses and run hands-on AI training workshops. Cofounded by Dr. Ashley Somogyi and Wesley Price."}},{"@type":"Question","name":"Where is Ardent Studio based?","acceptedAnswer":{"@type":"Answer","text":"We're based in Palm Beach County, Florida. We work with clients across South Florida in person, and remotely with clients anywhere in the United States."}},{"@type":"Question","name":"What does an AI automation project cost?","acceptedAnswer":{"@type":"Answer","text":"Most automation builds run $2,000 to $10,000 over 2 to 4 weeks, fixed price and fixed timeline. Larger custom builds are scoped separately. Every project starts with a free 30-minute scope call."}},{"@type":"Question","name":"How much does AI training cost?","acceptedAnswer":{"@type":"Answer","text":"We offer three workshop formats: a single 2-hour workshop at $2,250, a half-day deep dive where we ship a working tool together at $3,750, and a four-session team curriculum at $9,000. Every workshop is hands-on — your team leaves with a tool, not a slide deck."}},{"@type":"Question","name":"Do you teach in person or virtual?","acceptedAnswer":{"@type":"Answer","text":"Both. We deliver workshops in person across South Florida (Palm Beach, Broward, and Miami-Dade counties) and virtually for teams anywhere in the United States."}},{"@type":"Question","name":"What AI tools do you use?","acceptedAnswer":{"@type":"Answer","text":"We build with Anthropic Claude and Make.com as our primary stack. We chose Claude for its long context handling, reliable structured output, and voice-matching for client-facing writing. We teach the stack we ship."}},{"@type":"Question","name":"How long does a typical project take?","acceptedAnswer":{"@type":"Answer","text":"Most automation builds ship in 2 to 4 weeks. Workshops can be scheduled within 1 to 2 weeks of the discovery call. We don't take on projects we can't deliver in 4 weeks; if it's bigger, we scope it as multiple phases."}},{"@type":"Question","name":"Who do you work with?","acceptedAnswer":{"@type":"Answer","text":"Local service businesses, professional services (attorneys, accountants, consultants), trades and home services, and founder-stage AI products. We focus on small businesses and small teams, not enterprise."}}]}</script>
